<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyCAD</title>
  <link rel="stylesheet" href="https://www.nerdfonts.com/assets/css/webfont.css" />
</head>

<body>
  <div id="main">
    <div id="header">
      <h2 class="logo">EasyCAD</h2>
      <div id="toolbar">
        <div id="tools" class="container">
          <button class="tool" id="move"></button>
          <button class="tool" id="scale">󰩨</button>
          <button class="tool" id="rotate">󰚪</button>
        </div>
        <div id="primatives" class="container">
          <div class="dropdown">
            <button id="primatives">+ Add Shape</button>
            <div class="dropdown-content">
              <button class="primitive" id="cube">Cube</button>
              <button class="primitive" id="sphere">Sphere</button>
              <button class="primitive" id="cylinder">Cyllinder</button>
              <button class="primitive" id="cone">Cone</button>
              <button class="primitive" id="torus">Torus</button>
            </div>
          </div>
        </div>
        <div id="modifiers" class="container">
          <button class="modifier" id="merge">󰕤</button>
          <button class="modifier" id="subtract">󰕛</button>
          <button class="modifier" id="intersect">󰕝</button>
        </div>
      </div>
      <button id="export"><p id="download-icon">🢳</p><p id="download-text">Export Selected STLs</p></button>
    </div>

    <div id="viewport">
      <canvas id="bg"></canvas>

      <div class="overlay" id="editor-controls"></div>
    </div>


    <footer id="footer">
      <p id="selected">Nothing selected</p>
      <div id="camera-type">
        <input type='checkbox' id="cam-switch">
        <p>Orthographic</p>
      </div>
      <p id="statement">EasyCAD 2026 All Rights Reserved</p>
    </footer>

    <script type="module" src="main.js"></script>
  </div>
</body>

</html>
